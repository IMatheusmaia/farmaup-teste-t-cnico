server {
    listen 80;

    # Frontend estático
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para o LocalStack
    location /api/ {
        proxy_pass http://app.lambda-url.us-east-1.localhost.localstack.cloud:4566/;

        proxy_set_header Host app.lambda-url.us-east-1.localhost.localstack.cloud;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Loga status do backend
        proxy_intercept_errors on;
    }
}